global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: vault_bridge
    metrics_path: /api/v1/metrics
    # Set this for API-token protected production scrapes:
    # http_headers:
    #   X-Api-Key:
    #     files:
    #       - /run/secrets/vault_bridge_api_token
    static_configs:
      - targets:
          - vault-bridge:8080
